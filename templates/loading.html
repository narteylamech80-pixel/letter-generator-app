<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Generating Letter</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }

      .box {
        text-align: center;
        width: 400px;
      }

      .spinner-border {
        width: 4rem;
        height: 4rem;
      }

      .progress {
        height: 10px;
        border-radius: 20px;
        margin-top: 25px;
      }

      .text {
        margin-top: 20px;
        color: #cbd5e1;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <div class="spinner-border text-primary"></div>

      <h3 class="mt-4">Generating Your Letter</h3>

      <p class="text">Please wait while we prepare your document...</p>

      <div class="progress">
        <div
          class="progress-bar progress-bar-striped progress-bar-animated"
          role="progressbar"
          style="width: 100%"
        ></div>
      </div>
    </div>
  </body>
</html>
