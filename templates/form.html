<!doctype html>
<html>
  <head>
    <title>Internship Letter</title>
  </head>
  <body>
    <h2>Request Internship Letter</h2>

    <form method="POST">
      <input
        type="text"
        name="name"
        placeholder="Full Name"
        required
      /><br /><br />
      <input
        type="email"
        name="email"
        placeholder="Email"
        required
      /><br /><br />
      <input
        type="text"
        name="student_id"
        placeholder="Student ID"
        required
      /><br /><br />
      <input
        type="text"
        name="programme"
        placeholder="Programme"
        required
      /><br /><br />
      <input
        type="text"
        name="phone"
        placeholder="Phone"
        required
      /><br /><br />

      <button type="submit">Generate Letter</button>
    </form>
  </body>
</html>
