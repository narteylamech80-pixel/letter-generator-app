<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Vacation Training Letter Generator</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
        min-height: 100vh;
        display: flex;
        align-items: center;
      }

      .card {
        border: none;
        border-radius: 18px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      .header {
        background: #0d6efd;
        color: white;
        padding: 20px;
        border-radius: 18px 18px 0 0;
        text-align: center;
      }

      .form-control {
        border-radius: 10px;
        padding: 12px;
      }

      .btn-primary {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        font-weight: 600;
      }

      .note {
        font-size: 0.85rem;
        color: #94a3b8;
        text-align: center;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-7">
          <div class="card">
            <div class="header">
              <h3>Vacation Training Letter Generator</h3>
              <p class="mb-0">KNUST College of Engineering System</p>
            </div>

            <div class="card-body p-4">
              {% with messages = get_flashed_messages() %} {% if messages %}
              <div class="alert alert-danger">{{ messages[0] }}</div>
              {% endif %} {% endwith %}

              <form method="POST">
                <div class="mb-3">
                  <label class="form-label">Full Name</label>
                  <input
                    type="text"
                    id="name"
                    name="name"
                    class="form-control"
                    placeholder="Enter full name"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Email Address</label>
                  <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="example@gmail.com"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Student ID</label>
                  <input
                    type="text"
                    name="student_id"
                    class="form-control"
                    placeholder="e.g. 12345678"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Programme</label>
                  <select name="programme" class="form-control" required>
                    <option value="" disabled selected>
                      Select your programme
                    </option>
                    <option value="Computer">Computer Engineering</option>
                    <option value="Electrical">Electrical Engineering</option>
                    <option value="Mechanical">Mechanical Engineering</option>
                    <option value="Civil">Civil Engineering</option>
                    <option value="Petroleum">Petroleum Engineering</option>
                    <option value="Chemical">Chemical Engineering</option>
                    <option value="Materials">Materials Engineering</option>
                    <option value="Biomedical">Biomedical Engineering</option>
                    <option value="Agricultural">
                      Agricultural Engineering
                    </option>
                    <option value="Metallurgical">
                      Metallurgical Engineering
                    </option>
                    <option value="Petrochemical">
                      Petrochemical Engineering
                    </option>
                    <option value="Aerospace">Aerospace Engineering</option>
                    <option value="Automobile">Automobile Engineering</option>
                    <option value="Marine">Marine Engineering</option>
                    <option value="Geomatic">Geomatic Engineering</option>
                    <option value="Geological">Geological Engineering</option>
                    <option value="Telecommunication">
                      Telecommunication Engineering
                    </option>
                  </select>
                </div>

                <div class="mb-3">
                  <label class="form-label">Phone Number</label>
                  <input
                    type="text"
                    id="phone"
                    name="phone"
                    class="form-control"
                    placeholder="e.g. 555123456"
                  />
                </div>

                <button type="submit" class="btn btn-primary">
                  Generate Letter
                </button>

                <p class="note">
                  Your PDF will be generated instantly and emailed to you.
                </p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.getElementById("phone").addEventListener("input", function (e) {
        let value = e.target.value;

        // Remove non-digits
        value = value.replace(/\D/g, "");

        // Remove ALL leading zeros
        value = value.replace(/^0+/, "");

        e.target.value = value;
      });
    </script>

    <script>
      document.getElementById("name").addEventListener("input", function (e) {
        let value = e.target.value;

        // Convert to lowercase first, then capitalize each word
        value = value.toLowerCase().replace(/\b\w/g, function (char) {
          return char.toUpperCase();
        });

        e.target.value = value;
      });
    </script>
  </body>
</html>
