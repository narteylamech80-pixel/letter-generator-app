<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Success</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            padding: 30px;
            max-width: 500px;
        }

        .check-icon {
            font-size: 60px;
            color: #22c55e;
        }

        .btn-custom {
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="check-icon">✔</div>

    <h3 class="mt-3">Success!</h3>

    <p class="subtitle">
        Dear <b>{{ name }}</b>, your vacation training letter has been generated successfully.
    </p>

    <p class="subtitle">
        Your PDF has been downloaded automatically and sent to your email.
    </p>

    <hr>

    <div class="d-grid gap-2">

        <a href="/" class="btn btn-primary btn-custom">
            Generate Another Letter
        </a>

        <p class="subtitle mt-2">
            KNUST College of Engineering System
        </p>

    </div>

</div>

</body>
</html>
